{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/about/about.css' %}">
<section class="about-section">
 <div class="about-container">
      <div class="about-content">
            <h1>About Me</h1>

            <h3>{{ about.subtitle }}</h3>
            <p>{{ about.bio_1 }}</p>
            <p>{{ about.bio_2 }}</p>

        </div>

        <div class="about-image">
            <img src="{% static 'images/profile.jpg' %}" alt="profile">
        </div>

    </div>
</section>


<script src="{% static 'js/about/about.js' %}"></script>
{% endblock %}
